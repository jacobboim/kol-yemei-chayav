<!-- Logo 3: Torah scroll / Megillah with gold handles and Hebrew text lines -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <!-- Left handle (etz chayim) -->
  <rect x="5" y="8" width="5" height="32" rx="2.5" fill="#B8860B"/>
  <circle cx="7.5" cy="8" r="4" fill="#D4B44A"/>
  <circle cx="7.5" cy="40" r="4" fill="#D4B44A"/>
  <!-- Right handle -->
  <rect x="38" y="8" width="5" height="32" rx="2.5" fill="#B8860B"/>
  <circle cx="40.5" cy="8" r="4" fill="#D4B44A"/>
  <circle cx="40.5" cy="40" r="4" fill="#D4B44A"/>
  <!-- Scroll parchment body -->
  <rect x="10" y="10" width="28" height="28" rx="2" fill="#FBF8F2" stroke="#D4B44A" stroke-width="1"/>
  <!-- Rolled edges -->
  <ellipse cx="10" cy="24" rx="2" ry="14" fill="#EDE9E0" stroke="#D4B44A" stroke-width="0.8"/>
  <ellipse cx="38" cy="24" rx="2" ry="14" fill="#EDE9E0" stroke="#D4B44A" stroke-width="0.8"/>
  <!-- Hebrew text lines (RTL, stylized) -->
  <text x="35" y="18" font-family="'Frank Ruhl Libre', serif" font-size="5.5" fill="#5C5849" text-anchor="end" direction="rtl">כָּל יְמֵי</text>
  <text x="35" y="25" font-family="'Frank Ruhl Libre', serif" font-size="5.5" fill="#5C5849" text-anchor="end" direction="rtl">חַיָּיו</text>
  <!-- Decorative line below text -->
  <line x1="13" y1="29" x2="35" y2="29" stroke="#D4B44A" stroke-width="0.7" stroke-dasharray="2 2"/>
  <!-- Small text lines at bottom suggesting more content -->
  <line x1="13" y1="32" x2="32" y2="32" stroke="#9C9890" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="13" y1="35" x2="28" y2="35" stroke="#9C9890" stroke-width="0.8" stroke-linecap="round"/>
</svg>
