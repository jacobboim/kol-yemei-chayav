<!-- Logo 4: Elegant Hebrew monogram כ (Kaf) in a circular gold frame — clean modern feel -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <!-- Outer gold ring -->
  <circle cx="24" cy="24" r="21" stroke="#B8860B" stroke-width="1.5" fill="#FBF8F2"/>
  <!-- Inner decorative ring -->
  <circle cx="24" cy="24" r="18" stroke="#D4B44A" stroke-width="0.6" fill="none" stroke-dasharray="3 3"/>
  <!-- Hebrew letter כ (Kaf) — first letter of כל ימי חייו -->
  <text
    x="24"
    y="33"
    font-family="'Frank Ruhl Libre', 'Times New Roman', serif"
    font-size="28"
    font-weight="700"
    fill="#B8860B"
    text-anchor="middle"
    dominant-baseline="auto"
  >כ</text>
  <!-- Four decorative corner dots at compass points -->
  <circle cx="24" cy="4.5" r="1.5" fill="#D4B44A"/>
  <circle cx="43.5" cy="24" r="1.5" fill="#D4B44A"/>
  <circle cx="24" cy="43.5" r="1.5" fill="#D4B44A"/>
  <circle cx="4.5" cy="24" r="1.5" fill="#D4B44A"/>
</svg>
