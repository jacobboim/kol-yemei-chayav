<!-- Logo 2: Classic 7-branched menorah in gold, clean and minimal -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <!-- Base -->
  <rect x="17" y="40" width="14" height="2.5" rx="1.25" fill="#B8860B"/>
  <!-- Center stem -->
  <rect x="23" y="20" width="2" height="20" rx="1" fill="#B8860B"/>
  <!-- Left arms -->
  <path d="M24 28 Q18 28 18 22 L17 22" stroke="#B8860B" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M24 32 Q12 32 12 22 L11 22" stroke="#B8860B" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M24 36 Q6 36 6 22 L5 22" stroke="#B8860B" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Right arms -->
  <path d="M24 28 Q30 28 30 22 L31 22" stroke="#B8860B" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M24 32 Q36 32 36 22 L37 22" stroke="#B8860B" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M24 36 Q42 36 42 22 L43 22" stroke="#B8860B" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Flames: outer left, inner left, center, inner right, outer right + 2 more -->
  <!-- Outer left flame -->
  <ellipse cx="5" cy="19.5" rx="1.6" ry="2.5" fill="#D4B44A" opacity="0.9"/>
  <ellipse cx="5" cy="20.5" rx="1" ry="1.5" fill="#F5EDD0"/>
  <!-- Inner left flame -->
  <ellipse cx="11" cy="19.5" rx="1.6" ry="2.5" fill="#D4B44A" opacity="0.9"/>
  <ellipse cx="11" cy="20.5" rx="1" ry="1.5" fill="#F5EDD0"/>
  <!-- Left-center flame -->
  <ellipse cx="17" cy="19.5" rx="1.6" ry="2.5" fill="#D4B44A" opacity="0.9"/>
  <ellipse cx="17" cy="20.5" rx="1" ry="1.5" fill="#F5EDD0"/>
  <!-- Center flame (taller) -->
  <ellipse cx="24" cy="17.5" rx="1.8" ry="3" fill="#B8860B"/>
  <ellipse cx="24" cy="18.5" rx="1.1" ry="1.8" fill="#F5EDD0"/>
  <!-- Right-center flame -->
  <ellipse cx="31" cy="19.5" rx="1.6" ry="2.5" fill="#D4B44A" opacity="0.9"/>
  <ellipse cx="31" cy="20.5" rx="1" ry="1.5" fill="#F5EDD0"/>
  <!-- Inner right flame -->
  <ellipse cx="37" cy="19.5" rx="1.6" ry="2.5" fill="#D4B44A" opacity="0.9"/>
  <ellipse cx="37" cy="20.5" rx="1" ry="1.5" fill="#F5EDD0"/>
  <!-- Outer right flame -->
  <ellipse cx="43" cy="19.5" rx="1.6" ry="2.5" fill="#D4B44A" opacity="0.9"/>
  <ellipse cx="43" cy="20.5" rx="1" ry="1.5" fill="#F5EDD0"/>
</svg>
