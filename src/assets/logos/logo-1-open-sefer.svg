<!-- Logo 1: Open Sefer (book) with gold spine and Hebrew letter shin -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <!-- Left page -->
  <path d="M24 10 C24 10 10 11 8 13 L8 38 C10 36 24 35 24 35 Z" fill="#F7F4EE" stroke="#B8860B" stroke-width="1.2"/>
  <!-- Right page -->
  <path d="M24 10 C24 10 38 11 40 13 L40 38 C38 36 24 35 24 35 Z" fill="#F7F4EE" stroke="#B8860B" stroke-width="1.2"/>
  <!-- Spine -->
  <rect x="22.5" y="9" width="3" height="27" rx="1.5" fill="#B8860B"/>
  <!-- Hebrew letter shin on left page -->
  <text x="15" y="27" font-family="'Frank Ruhl Libre', serif" font-size="13" fill="#B8860B" text-anchor="middle" dominant-baseline="middle">שׁ</text>
  <!-- Lines on right page suggesting text -->
  <line x1="28" y1="19" x2="37" y2="19" stroke="#9C9890" stroke-width="1" stroke-linecap="round"/>
  <line x1="28" y1="23" x2="37" y2="23" stroke="#9C9890" stroke-width="1" stroke-linecap="round"/>
  <line x1="28" y1="27" x2="36" y2="27" stroke="#9C9890" stroke-width="1" stroke-linecap="round"/>
  <!-- Bottom shadow -->
  <ellipse cx="24" cy="38" rx="14" ry="2" fill="#B8860B" opacity="0.15"/>
</svg>
